{% extends "base.html" %}
{% block title %}新建任务 - 校园违规车辆检测系统{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-3">新建检测任务</h4>
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">任务名称</label>
            <input type="text" class="form-control" name="title" placeholder="例如：东门摄像头_2026-03-20">
          </div>
          <div class="mb-3">
            <label class="form-label">上传视频</label>
            <input type="file" class="form-control" name="video" accept=".mp4,.avi,.mov,.mkv" required>
          </div>
          <button type="submit" class="btn btn-primary">提交并开始检测</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
